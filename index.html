<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nationalize</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>Descubra a nacionalidade de um nome</h1>
        <form id="meuForm" class="formulario">

            <label for="nome">Digite um nome</label>

            <input
                type="text"
                id="nome"
                placeholder="Ex: Maria"
                maxlength="15"
            >

            <button 
                type="submit"
                id="botao" 
                disabled
             >Buscar</button>

        </form>
        <section id="resultado"></section>
    </div>
    <script src="script.js"></script>
</body>
</html>
